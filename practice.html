<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上題目演練｜Ray's English Corner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#faf8f2; --cream-d:#ede8d8; --green-dk:#1e4d30; --green-md:#3a7a50;
    --green-lt:#6db88a; --green-pl:#e2f2e8; --amber:#f5a623; --amber-pl:#fff8ec;
    --warm:#e07850; --warm-pl:#fdf0ea; --text:#1a2a1a; --text-md:#466046;
    --text-lt:#7a9a7a; --border:#d5cbb5; --white:#ffffff;
    --sh:0 4px 20px rgba(30,77,48,0.10); --sh-lg:0 12px 48px rgba(30,77,48,0.15);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);line-height:1.75;overflow-x:hidden;}
  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--cream-d);} ::-webkit-scrollbar-thumb{background:var(--green-lt);border-radius:99px;}

  nav{position:sticky;top:0;z-index:100;background:rgba(250,248,242,0.94);backdrop-filter:blur(14px);border-bottom:1.5px solid var(--border);padding:0 5%;height:58px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--green-dk);text-decoration:none;display:flex;align-items:center;gap:6px;}
  .nav-logo .dot{color:var(--warm);}
  .nav-links{display:flex;gap:1.6rem;list-style:none;}
  .nav-links a{text-decoration:none;color:var(--text-md);font-size:0.86rem;font-weight:800;letter-spacing:0.04em;transition:color .18s;position:relative;}
  .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:2px;background:var(--amber);border-radius:99px;transform:scaleX(0);transition:transform .2s;}
  .nav-links a:hover{color:var(--green-dk);} .nav-links a:hover::after{transform:scaleX(1);}
  .nav-links a.active{color:var(--green-dk);} .nav-links a.active::after{transform:scaleX(1);}

  /* Hero */
  .page-hero{background:var(--green-dk);padding:64px 5% 56px;text-align:center;position:relative;overflow:hidden;}
  .page-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:24px 24px;}
  .page-hero .eyebrow{font-size:0.74rem;font-weight:900;letter-spacing:0.15em;text-transform:uppercase;color:var(--green-lt);margin-bottom:10px;}
  .page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:#fff;margin-bottom:14px;}
  .page-hero p{color:rgba(255,255,255,0.65);max-width:540px;margin:0 auto;font-size:1rem;}

  /* Main */
  main{max-width:1100px;margin:0 auto;padding:56px 5% 80px;}

  /* Category Tabs */
  .cat-label{font-size:0.78rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-lt);margin-bottom:14px;}
  .cats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:40px;}
  .cat-btn{background:var(--white);border:2px solid var(--border);border-radius:50px;padding:9px 22px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;color:var(--text-md);cursor:pointer;transition:all .18s;}
  .cat-btn:hover{border-color:var(--green-lt);background:var(--green-pl);color:var(--green-dk);}
  .cat-btn.active{background:var(--green-dk);border-color:var(--green-dk);color:#fff;}
  .cat-btn .cnt{display:inline-block;background:rgba(255,255,255,0.2);border-radius:99px;padding:1px 7px;font-size:0.75rem;margin-left:5px;}
  .cat-btn:not(.active) .cnt{background:var(--cream-d);color:var(--text-lt);}

  /* Score bar */
  .score-bar{display:flex;align-items:center;gap:16px;background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:16px 22px;margin-bottom:28px;box-shadow:var(--sh);}
  .score-bar .sb-label{font-size:0.82rem;font-weight:800;color:var(--text-lt);}
  .score-bar .sb-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--green-dk);}
  .score-bar .sb-sep{width:1.5px;height:32px;background:var(--border);}
  .pb-wrap{flex:1;background:var(--cream-d);border-radius:99px;height:8px;overflow:hidden;}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--green-md),var(--green-lt));border-radius:99px;transition:width .4s ease;}

  /* Questions grid */
  .q-grid{display:flex;flex-direction:column;gap:20px;}
  .q-card{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:28px;box-shadow:var(--sh);transition:box-shadow .2s;}
  .q-card:hover{box-shadow:var(--sh-lg);}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .q-num{background:var(--green-dk);color:#fff;font-size:0.78rem;font-weight:900;padding:3px 11px;border-radius:99px;}
  .q-tag{background:var(--amber-pl);color:#a06800;font-size:0.76rem;font-weight:800;padding:3px 10px;border-radius:99px;border:1px solid rgba(245,166,35,.25);}
  .q-text{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:18px;line-height:1.6;}
  .q-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .q-opt{background:var(--cream);border:2px solid var(--border);border-radius:11px;padding:10px 15px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text);transition:all .15s;text-align:left;}
  .q-opt:hover:not(:disabled){border-color:var(--green-lt);background:var(--green-pl);transform:translateX(2px);}
  .q-opt.correct{border-color:var(--green-md);background:var(--green-pl);color:var(--green-dk);}
  .q-opt.wrong{border-color:#e07070;background:#fdf0f0;color:#b84040;}
  .q-opt:disabled{cursor:default;}
  .q-exp{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:0.88rem;font-weight:700;line-height:1.65;display:none;}
  .q-exp.show{display:block;}
  .q-exp.correct{background:var(--green-pl);color:var(--green-dk);}
  .q-exp.wrong{background:#fdf0f0;color:#b84040;}

  /* Result banner */
  .result-banner{display:none;background:linear-gradient(135deg,var(--green-dk),var(--green-md));border-radius:20px;padding:36px;text-align:center;color:#fff;margin-bottom:28px;}
  .result-banner.show{display:block;}
  .rb-score{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;line-height:1;}
  .rb-msg{margin:10px 0 20px;font-size:1rem;opacity:.85;line-height:1.7;}
  .rb-btn{background:#fff;color:var(--green-dk);border:none;border-radius:50px;padding:11px 28px;font-family:'Nunito',sans-serif;font-size:0.92rem;font-weight:900;cursor:pointer;transition:transform .15s;}
  .rb-btn:hover{transform:translateY(-2px);}

  /* All done CTA */
  .done-cta{text-align:center;margin-top:36px;display:none;}
  .done-cta.show{display:block;}
  .submit-all{background:linear-gradient(135deg,var(--green-dk),var(--green-md));color:#fff;border:none;border-radius:50px;padding:14px 40px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(30,77,48,.25);transition:transform .15s,box-shadow .15s;}
  .submit-all:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(30,77,48,.3);}

  footer{background:var(--green-dk);color:rgba(255,255,255,.65);text-align:center;padding:32px 5%;font-size:0.85rem;line-height:1.9;}
  .f-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:#fff;margin-bottom:5px;}
  .f-logo span{color:var(--amber);}

  .reveal{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;}
  .reveal.visible{opacity:1;transform:none;}

  @media(max-width:700px){.q-opts{grid-template-columns:1fr;} .nav-links{display:none;}}
</style>
</head>

<div class="page-hero">
  <div class="eyebrow">Online Practice</div>
  <h1>線上題目演練 ✏️</h1>
  <p>選一個文法主題，從頭做到尾，答完馬上看解析。<br>每次都從頭做一遍，才是真的學會！</p>
</div>

<main>
  <div class="cat-label">選擇練習主題</div>
  <div class="cats" id="cats"></div>

  <div class="score-bar" id="scoreBar">
    <div>
      <div class="sb-label">目前得分</div>
      <div class="sb-val" id="scoreVal">0 / 0</div>
    </div>
    <div class="sb-sep"></div>
    <div style="flex:1;">
      <div class="sb-label" style="margin-bottom:6px;">答題進度</div>
      <div class="pb-wrap"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="result-banner" id="resultBanner">
    <div class="rb-score" id="rbScore"></div>
    <div class="rb-msg" id="rbMsg"></div>
    <button class="rb-btn" onclick="resetQuiz()">🔄 重新練習這個主題</button>
  </div>

  <div class="q-grid" id="qGrid"></div>

  <div class="done-cta" id="doneCta">
    <p style="color:var(--text-md);margin-bottom:16px;font-weight:700;">所有題目都做完了！</p>
    <button class="submit-all" onclick="showResult()">查看成績 →</button>
  </div>
</main>

<script>
const bank = {
  '國二下 U5 特訓（一）：數量不定代名詞 Both / All / Each': [
    {q:"1. I have two brothers. _____ of them are on the baseball team.",opts:["All","Both","Each","One"],ans:1,exp:"前句提到「two brothers（兩個兄弟）」，指「兩者都...」時需使用 both。All 用於三者或三者以上；Each 強調個別（動詞需配單數）；One 指其中一個（動詞需配單數）。後方動詞為 are，故選 Both。"},
    {q:"2. _____ of the books has a number. You can find them easily.",opts:["All","Both","Each","Two"],ans:2,exp:"注意動詞是單數的 has。All, Both, Two 若當主詞指代複數名詞時，動詞都必須是複數（have）。只有 Each（每一個）視為單數，搭配 has。"},
    {q:"3. There are three boys playing in the park. _____ of them look very happy.",opts:["Both","All","Much","One"],ans:1,exp:"前句提到「three boys（三個男孩）」，指「三者或以上都...」必須使用 All。Both 只用於兩者。動詞 look 是複數動詞，排除 One。"},
    {q:"4. _____ of his hands were dirty after he cleaned the kitchen.",opts:["All","Both","Every","Each"],ans:1,exp:"人只有「兩隻」手，指「兩者都...」用 Both。動詞 were 也是複數。注意 Every 不能單獨當代名詞使用（不可接 of）。"},
    {q:"5. Look at the soccer players! Two of them _____ eating burgers.",opts:["is","are","has","have"],ans:1,exp:"主詞是 Two（兩個人），為複數，配合現在進行式 (eating)，需使用 Be 動詞複數 are。"},
    {q:"6. A: How _____ of the boys know the answer? B: Two of them do.",opts:["many","much","little","few"],ans:0,exp:"the boys 是可數名詞，詢問「多少個（人）」要用 How many。How much 用於不可數名詞。"},
    {q:"7. One of my favorite recipes for a cough _____ honey with lemon.",opts:["am","are","is","be"],ans:2,exp:"這是常見陷阱題！真正的主詞是句首的 One（其中一個），後面的 \"of my favorite recipes for a cough\" 只是修飾語。主詞是單數 One，所以 Be 動詞要配 is。"},
    {q:"8. Five of my classmates _____ NBA games every weekend.",opts:["watch","watches","watching","to watch"],ans:0,exp:"真正的主詞是 Five（五個人），為複數主詞。表示習慣動作（every weekend）用現在簡單式，複數主詞搭配原形動詞 watch。"},
    {q:"9. _____ of my parents drink a lot of water every day.",opts:["All","Both","Much","One"],ans:1,exp:"parents（雙親）固定為「兩個人」，指兩人皆是，所以使用 Both。動詞 drink 為複數動詞，也可排除 One。"},
    {q:"10. Many of the students _____ a sore throat today.",opts:["has","have","is","are"],ans:1,exp:"主詞是 Many（許多人），為複數主詞。「有」喉嚨痛要用一般動詞 have，且配複數主詞不加 s。"}
  ],
  '國一下 U5 特訓（二）：可數 vs 不可數名詞的陷阱': [
    {q:"11. Much of the news on TV _____ not true.",opts:["is","are","do","does"],ans:0,exp:"news（新聞）是不可數名詞（字尾的 s 不是複數），不可數名詞永遠視為單數，因此配合單數 Be 動詞 is。"},
    {q:"12. All of the music _____ beautiful. I love it!",opts:["sound","sounds","sounding","to sound"],ans:1,exp:"music（音樂）是不可數名詞。雖然前面有 All，但 All of + 不可數名詞，整體仍視為單數。因此動詞 sound 必須加上 s 變成 sounds（聽起來）。"},
    {q:"13. I have a lot of homework today. Most of it _____ very difficult.",opts:["is","are","has","have"],ans:0,exp:"it 代替前面的 homework，homework 為不可數名詞，故 Most of it 也視為單數，搭配 is。"},
    {q:"14. Some of the information you gave me _____ very useful for our plan.",opts:["are","is","am","be"],ans:1,exp:"information（資訊）在英文中是不可數名詞。Some of + 不可數名詞，視為單數，搭配 is。"},
    {q:"15. I need to buy a new computer. How _____ money do you have?",opts:["many","much","few","little"],ans:1,exp:"money（金錢）是不可數名詞，詢問「多少（錢）」必須使用 How much。"},
    {q:"16. Two of the students didn't finish their _____.",opts:["homeworks","homework","homeworking","homework's"],ans:1,exp:"這題考基本觀念。homework 是不可數名詞，字尾絕對不可以加 s。"},
    {q:"17. The good news _____ that no one was hurt in the accident.",opts:["is","are","has","have"],ans:0,exp:"news 是不可數名詞，視為單數。"},
    {q:"18. _____ of the bread on the table is cold. Let's heat it up.",opts:["Some","Two","Many","Both"],ans:0,exp:"bread（麵包）是不可數名詞。Two, Many, Both 都只能用來修飾「可數名詞複數」。只有 Some 可以同時修飾可數 or 不可數名詞。"}
  ],
  '國一下 U5 特訓（三）：數量代名詞 a few / few / a little / little': [
    {q:"19. I have _____ time, so let's talk and have a cup of coffee.",opts:["a few","few","a little","little"],ans:2,exp:"time 是不可數名詞，先排除 a few / few。後半句說「那我們來聊天喝咖啡吧」，代表時間是「有一點；足夠的」，偏肯定語氣，故選 a little。"},
    {q:"20. I have _____ time left. I must go now, or I will be late!",opts:["a few","few","a little","little"],ans:3,exp:"time 為不可數名詞。後半句說「我現在必須走了，不然會遲到」，代表時間「幾乎沒有了」，偏否定語氣，故選 little。"},
    {q:"21. The test was very hard. _____ students passed it.",opts:["A few","Few","A little","Little"],ans:1,exp:"students 是可數名詞，先排除 a little / little。前半句說「考試非常難」，代表通過的學生「幾乎沒有；很少」，否定語氣，故選 Few。"},
    {q:"22. He is very shy and has _____ friends, so he often feels lonely.",opts:["a few","few","a little","little"],ans:1,exp:"friends 是可數名詞。後半句說「他經常覺得孤單」，代表朋友「幾乎沒有」，故選 few。"},
    {q:"23. Can you give me _____ water? I am very thirsty.",opts:["a few","few","a little","little"],ans:2,exp:"water 是不可數名詞。跟別人要水喝，是希望對方給「一些」，有 a 才有東西，故選 a little。"},
    {q:"24. There is _____ milk left in the fridge. We can't make the cake.",opts:["a few","few","a little","little"],ans:3,exp:"milk 是不可數名詞。後半句說「我們沒辦法做蛋糕了」，代表牛奶「幾乎沒剩下了」，否定語氣，故選 little。"},
    {q:"25. I have _____ dollars, so I can buy you a drink.",opts:["a few","few","a little","little"],ans:0,exp:"dollars（元）是有加 s 的可數名詞（注意 money 才是不可數）。後半句說「我可以買飲料請你」，代表錢「有幾個；足夠」，肯定語氣，故選 a few。"},
    {q:"26. Very _____ people know about this secret band. They are not famous.",opts:["a few","few","a little","little"],ans:1,exp:"people（人們）是複數可數名詞。後半句說「他們不出名」，代表知道的人「幾乎沒有」，故搭配 few。"},
    {q:"27. Let's ask Cody. He might know _____ about the science fair.",opts:["a few","few","a little","little"],ans:2,exp:"這裡省略了名詞 things 或 information。指代知道「一些事情/資訊」用 a little 修飾抽象程度。"}
  ],
  '國一下 U5 特訓（四）：副詞連接詞 Although / Though 的轉折陷阱': [
    {q:"28. _____ the food looks delicious, I don't want to eat it.",opts:["Because","Although","If","So"],ans:1,exp:"前後句意相反。「雖然」食物看起來好吃，「但是」我不想吃。連接詞填入 Although。"},
    {q:"29. Although he was sick, _____ he still went to work.",opts:["but","so","and","（無需填字）"],ans:3,exp:"英文文法鐵則：Although 跟 But 一山不容二虎，一句話中只能留一個。前半句已經有 Although，後半句就不能再加 but。"},
    {q:"30. Which sentence is correct?",opts:["Although she is rich, but she is not happy.","She is rich, although she is not happy.","Although she is rich, she is not happy.","But she is rich, although she is not happy."],ans:2,exp:"犯了 although 和 but 連用的錯誤。正確：「雖然她很有錢，但她不快樂。」"},
    {q:"31. He spent hours shopping, _____ he wasn't tired at all.",opts:["although","but","so","because"],ans:1,exp:"前半句沒有 Although，且語氣轉折（逛了很久「但是」不累），通常連接兩個獨立子句會在中間放 but，且前方常有逗號。"},
    {q:"32. _____ it rained this morning, Samuel didn't use his umbrella.",opts:["Though","But","So","Because"],ans:0,exp:"Though 與 Although 用法相同，放句首表示「雖然...」。But 通常不會放在句首引導從屬子句。"},
    {q:"33. \"Although I was late, the teacher wasn't mad.\" 換句話說等於？",opts:["I was late, but the teacher wasn't mad.","Although I was late, but the teacher wasn't mad.","But I was late, the teacher wasn't mad.","Because I was late, the teacher wasn't mad."],ans:0,exp:"刪除 Although，改在兩個子句中間加上 but，語意完全一樣。"},
    {q:"34. _____ Betty saw the trash on the floor, she didn't pick it up.",opts:["Because","If","Though","So"],ans:2,exp:"語意測試：「雖然」Betty 看到地上有垃圾，她還是沒有撿起來。"},
    {q:"35. They decided to go to the beach _____ it was raining and cold.",opts:["because","even though","but","so"],ans:1,exp:"even though 語氣比 though/although 更強烈，表示「即使；儘管」。句意為：他們決定去海邊「即使」天氣又下雨又冷。"}
  ]
  // 
  '📝 國一下 U5 文法實戰特訓（全真統整 35 題）': [
    {q:"1. I have two brothers. _____ of them are on the baseball team.",opts:["All","Both","Each","One"],ans:1,exp:"前句提到「two brothers（兩個兄弟）」，指「兩者都...」時需使用 both。後方動詞為 are，故選 Both。"},
    {q:"2. _____ of the books has a number. You can find them easily.",opts:["All","Both","Each","Two"],ans:2,exp:"注意動詞是單數的 has。只有 Each（每一個）視為單數，搭配 has。"},
    {q:"3. There are three boys playing in the park. _____ of them look very happy.",opts:["Both","All","Much","One"],ans:1,exp:"三個男孩，指「三者或以上都...」必須使用 All。"},
    {q:"4. _____ of his hands were dirty after he cleaned the kitchen.",opts:["All","Both","Every","Each"],ans:1,exp:"人只有「兩隻」手，指「兩者都...」用 Both。動詞 were 也是複數。"},
    {q:"5. Look at the soccer players! Two of them _____ eating burgers.",opts:["is","are","has","have"],ans:1,exp:"主詞是 Two（兩個人），為複數，配合現在進行式，需使用 Be 動詞複數 are。"},
    {q:"6. A: How _____ of the boys know the answer? B: Two of them do.",opts:["many","much","little","few"],ans:0,exp:"the boys 是可數名詞，詢問「多少個（人）」要用 How many。"},
    {q:"7. One of my favorite recipes for a cough _____ honey with lemon.",opts:["am","are","is","be"],ans:2,exp:"真正的主詞是句首的 One（其中一個），單數主詞 Be 動詞要配 is。"},
    {q:"8. Five of my classmates _____ NBA games every weekend.",opts:["watch","watches","watching","to watch"],ans:0,exp:"主詞是 Five（五個人），複數主詞搭配原形動詞 watch。"},
    {q:"9. _____ of my parents drink a lot of water every day.",opts:["All","Both","Much","One"],ans:1,exp:"parents（雙親）固定為「兩個人」，指兩人皆是，所以使用 Both。"},
    {q:"10. Many of the students _____ a sore throat today.",opts:["has","have","is","are"],ans:1,exp:"主詞是 Many（許多人），為複數主詞。「有」喉嚨痛要用一般動詞 have。"},
    {q:"11. Much of the news on TV _____ not true.",opts:["is","are","do","does"],ans:0,exp:"news（新聞）是不可數名詞，永遠視為單數，因此配合單數 Be 動詞 is。"},
    {q:"12. All of the music _____ beautiful. I love it!",opts:["sound","sounds","sounding","to sound"],ans:1,exp:"music 是不可數名詞。All of + 不可數名詞，整體仍視為單數，動詞 sound 必須加上 s。"},
    {q:"13. I have a lot of homework today. Most of it _____ very difficult.",opts:["is","are","has","have"],ans:0,exp:"homework 為不可數名詞，故 Most of it 也視為單數，搭配 is。"},
    {q:"14. Some of the information you gave me _____ very useful for our plan.",opts:["are","is","am","be"],ans:1,exp:"information 是不可數名詞，Some of + 不可數名詞視為單數，搭配 is。"},
    {q:"15. I need to buy a new computer. How _____ money do you have?",opts:["many","much","few","little"],ans:1,exp:"money 是不可數名詞，詢問多少錢必須使用 How much。"},
    {q:"16. Two of the students didn't finish their _____.",opts:["homeworks","homework","homeworking","homework's"],ans:1,exp:"homework 是不可數名詞，字尾絕對不可以加 s。"},
    {q:"17. The good news _____ that no one was hurt in the accident.",opts:["is","are","has","have"],ans:0,exp:"news 是不可數名詞，永遠視為單數。"},
    {q:"18. _____ of the bread on the table is cold. Let's heat it up.",opts:["Some","Two","Many","Both"],ans:0,exp:"bread（麵包）是不可數名詞。只有 Some 可以同時修飾可數或不可數名詞。"},
    {q:"19. I have _____ time, so let's talk and have a cup of coffee.",opts:["a few","few","a little","little"],ans:2,exp:"time 是不可數名詞。後半句說「那我們來聊天吧」，代表時間「足夠」，偏肯定選 a little。"},
    {q:"20. I have _____ time left. I must go now, or I will be late!",opts:["a few","few","a little","little"],ans:3,exp:"後半句說「我現在必須走了，不然會遲到」，代表時間「幾乎沒有了」，偏否定選 little。"},
    {q:"21. The test was very hard. _____ students passed it.",opts:["A few","Few","A little","Little"],ans:1,exp:"students 是可數名詞。後半句說「考試非常難」，代表通過的學生「幾乎沒有」，選 Few。"},
    {q:"22. He is very shy and has _____ friends, so he often feels lonely.",opts:["a few","few","a little","little"],ans:1,exp:"friends 是可數名詞。後半句說「他經常覺得孤單」，代表朋友「幾乎沒有」，選 few。"},
    {q:"23. Can you give me _____ water? I am very thirsty.",opts:["a few","few","a little","little"],ans:2,exp:"water 是不可數名詞。跟別人要水喝，是希望對方給「一些」，偏肯定語氣選 a little。"},
    {q:"24. There is _____ milk left in the fridge. We can't make the cake.",opts:["a few","few","a little","little"],ans:3,exp:"milk 不可數。後半句說「沒辦法做蛋糕了」，代表牛奶「幾乎沒剩」，選 little。"},
    {q:"25. I have _____ dollars, so I can buy you a drink.",opts:["a few","few","a little","little"],ans:0,exp:"dollars 是可數名詞。後句說「可以請你喝飲料」，表示足夠，選 a few。"},
    {q:"26. Very _____ people know about this secret band. They are not famous.",opts:["a few","few","a little","little"],ans:1,exp:"people 是複數可數名詞。後半句說「他們不出名」，代表知道的人「幾乎沒有」，搭配 few。"},
    {q:"27. Let's ask Cody. He might know _____ about the science fair.",opts:["a few","few","a little","little"],ans:2,exp:"指代知道「一些事情/資訊」用 a little 修飾抽象名詞。"},
    {q:"28. _____ the food looks delicious, I don't want to eat it.",opts:["Because","Although","If","So"],ans:1,exp:"「雖然」食物看起來好吃，「但是」我不想吃。連接詞填入 Although。"},
    {q:"29. Although he was sick, _____ he still went to work.",opts:["but","so","and","（無需填字）"],ans:3,exp:"Although 跟 But 不能連用！前半句已經有 Although，後半句就不能再加 but。"},
    {q:"30. Which sentence is correct?",opts:["Although she is rich, but she is not happy.","She is rich, although she is not happy.","Although she is rich, she is not happy.","But she is rich, although she is not happy."],ans:2,exp:"although 和 but 不能共存。正確：「雖然她很有錢，但她不快樂。」"},
    {q:"31. He spent hours shopping, _____ he wasn't tired at all.",opts:["although","but","so","because"],ans:1,exp:"前半句沒有 Although，且語氣轉折（逛了很久「但是」不累），在中間放 but 連接兩個獨立子句。"},
    {q:"32. _____ it rained this morning, Samuel didn't use his umbrella.",opts:["Though","But","So","Because"],ans:0,exp:"Though 與 Although 用法相同，放句首表示「雖然...」。"},
    {q:"33. \"Although I was late, the teacher wasn't mad.\" 換句話說等於？",opts:["I was late, but the teacher wasn't mad.","Although I was late, but the teacher wasn't mad.","But I was late, the teacher wasn't mad.","Because I was late, the teacher wasn't mad."],ans:0,exp:"刪除句首的 Although，改在兩個子句中間加上 but，句意完全一樣。"},
    {q:"34. _____ Betty saw the trash on the floor, she didn't pick it up.",opts:["Because","If","Though","So"],ans:2,exp:"語意測試：「雖然」Betty 看到地上有垃圾，她還是沒有撿起來。"},
    {q:"35. They decided to go to the beach _____ it was raining and cold.",opts:["because","even though","but","so"],ans:1,exp:"even though 表示「即使；儘管」，語氣比 although 更強烈。"}
  ]
};
  
const catKeys = Object.keys(bank);
let currentCat = catKeys[0];
let answered = [];
let scores = [];

function init(){
  const catsEl = document.getElementById('cats');
  catKeys.forEach((k,i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i===0?' active':'');
    btn.innerHTML = `${k} <span class="cnt">${bank[k].length}</span>`;
    btn.onclick = () => switchCat(k, btn);
    catsEl.appendChild(btn);
  });
  renderQuiz(currentCat);
}

function switchCat(key, btn){
  currentCat = key;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz(key);
  window.scrollTo({top: document.querySelector('.cats').offsetTop - 80, behavior:'smooth'});
}

function renderQuiz(key){
  const qs = bank[key];
  answered = new Array(qs.length).fill(false);
  scores = new Array(qs.length).fill(0);
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('doneCta').classList.remove('show');
  updateScore();

  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  qs.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card reveal';
    card.id = `qc${qi}`;
    const letters = ['A','B','C','D'];
    const optsHtml = q.opts.map((o,oi) =>
      `<button class="q-opt" id="opt${qi}_${oi}" onclick="selectOpt(${qi},${oi})">(${letters[oi]}) ${o}</button>`
    ).join('');
    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${qi+1}</span>
        <span class="q-tag">${key}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">${optsHtml}</div>
      <div class="q-exp" id="exp${qi}"></div>
    `;
    grid.appendChild(card);
  });

  // Reveal animation
  setTimeout(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.05});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  }, 50);
}

function selectOpt(qi, oi){
  if(answered[qi]) return;
  answered[qi] = true;
  const q = bank[currentCat][qi];
  const opts = document.querySelectorAll(`[id^="opt${qi}_"]`);
  opts.forEach(b => b.disabled = true);
  const exp = document.getElementById(`exp${qi}`);

  if(oi === q.ans){
    opts[oi].classList.add('correct');
    exp.textContent = '✓ 答對了！' + q.exp;
    exp.className = 'q-exp show correct';
    scores[qi] = 1;
  } else {
    opts[oi].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    exp.textContent = '✗ 再想想看。' + q.exp;
    exp.className = 'q-exp show wrong';
    scores[qi] = 0;
  }
  updateScore();
  if(answered.every(Boolean)){
    document.getElementById('doneCta').classList.add('show');
  }
}

function updateScore(){
  const total = bank[currentCat].length;
  const done = answered.filter(Boolean).length;
  const sc = scores.reduce((a,b)=>a+b,0);
  document.getElementById('scoreVal').textContent = `${sc} / ${done}`;
  document.getElementById('pbFill').style.width = (done/total*100)+'%';
}

function showResult(){
  const total = bank[currentCat].length;
  const sc = scores.reduce((a,b)=>a+b,0);
  const p = sc/total;
  document.getElementById('rbScore').textContent = `${sc} / ${total}`;
  const msgs = p>=.9?'太棒了！🎉 這個主題掌握得很好，可以挑戰下一個了！':p>=.7?'做得不錯！😊 有幾題可以再複習一下，再試一次就穩了。':p>=.5?'加油！💪 建議回去看看文法筆記，再重新練習一遍。':'再試一次沒關係！先把文法觀念搞清楚，再來做題目。😊';
  document.getElementById('rbMsg').textContent = msgs;
  document.getElementById('resultBanner').classList.add('show');
  document.getElementById('doneCta').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetQuiz(){ renderQuiz(currentCat); window.scrollTo({top: document.querySelector('.q-grid').offsetTop - 80, behavior:'smooth'}); }

init();
</script>
