name: Daily Link Check

on:
  schedule:
    - cron: '30 14 * * *'   # 每天 UTC 14:30（台灣時間 22:30）
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,301,302,403,429
            --exclude 'fonts.googleapis.com'
            --exclude 'cdn.tailwindcss.com'
            '*.html'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Ray's English Corner — 每日連結檢查報告"
          to: biglazyseals@gmail.com
          from: biglazyseals@gmail.com
          body_path: ./lychee/out.md
